<!doctype html>
<html>
<head>
    <title>Route Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body, html { margin: 0; padding: 0; }

        #map {
            height: 100vh;
            width: 100%;
        }

        #stop-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            padding: 10px 15px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>
<button id="stop-btn" onclick="stopConsuming()">End Ride</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([18.5204, 73.8567], 15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors",
}).addTo(map);

const polyline = L.polyline([], {
    color: "blue",
    weight: 5,
}).addTo(map);

const bounds = L.latLngBounds();

const urlParams = new URLSearchParams(window.location.search);
const topic = urlParams.get("topic");

let socket;

function connectWebSocket() {
    socket = new WebSocket(
        `wss://${window.location.host}/ws?topic=${topic}&client_type=consumer`
    );

    socket.onopen = () => {
        console.log("Connected to WebSocket");
    };

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);

        const point = [data.lat, data.long];
        console.log("Location:", point);

        polyline.addLatLng(point);
        bounds.extend(point);
        map.panTo(point);
    };

    socket.onclose = () => {
        console.log("Disconnected. Reconnecting...");
        setTimeout(connectWebSocket, 2000);
    };

    socket.onerror = (err) => {
        console.log("Error:", err);
        socket.close();
    };
}

connectWebSocket();


function stopConsuming() {
    if (!topic) return alert("No topic");

    fetch(`/stop_listening?topic=${topic}`, {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        alert(data.status);
        if (socket) socket.close();
    })
    .catch(err => console.error(err));
}


// 🧹 Cleanup
window.addEventListener("beforeunload", stopConsuming);
</script>
</body>
</html>
